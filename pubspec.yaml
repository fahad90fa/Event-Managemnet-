name: wedding_app
description: "BookMyEvent - A premium event planning platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Architecture
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  injectable: ^2.3.0
  go_router: ^12.1.0

  # Networking & Data
  dio: ^5.3.3
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # UI & Animations
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  carousel_slider: ^4.2.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.1
  share_plus: ^12.0.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  image_cropper: ^11.0.0
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0
  pdf: ^3.10.4
  
  # Platform Integration
  # Firebase packages commented out until configuration files (google-services.json) are provided
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.5
  
  flutter_local_notifications: ^17.2.2
  workmanager: ^0.9.0+3
  connectivity_plus: ^6.0.5
  device_info_plus: ^12.3.0
  flutter_secure_storage: ^9.0.0
  flutter_slidable: ^4.0.3
  path: ^1.9.1
  safe_device: ^1.1.6
  crypto: ^3.0.3
  fl_chart: ^1.1.1
  uuid: ^4.5.2
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  retrofit_generator: ^10.2.1
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  logger: ^2.0.2
  flutter_native_splash: ^2.3.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/empty_states/
    - assets/images/icons/
    - assets/images/backgrounds/
    - assets/animations/lottie/
    - assets/animations/rive/
    - assets/data/

  # fonts:
  #   - family: JameelNoori
  #     fonts:
  #       - asset: assets/fonts/JameelNoori/JameelNooriNastaleeq.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
